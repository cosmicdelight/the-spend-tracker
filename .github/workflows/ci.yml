name: CI

on:
  push:
    branches: [ main, fix/**, feat/** ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit Tests (Vitest)
        run: npm run test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E Tests
        run: |
          # Extract dynamic keys
          VITE_SUPABASE_URL=$(supabase status -o json | grep '"api_url"' | awk -F'"' '{print $4}')
          VITE_SUPABASE_PUBLISHABLE_KEY=$(supabase status -o json | grep '"anon_key"' | awk -F'"' '{print $4}')
          export SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | grep '"service_role_key"' | awk -F'"' '{print $4}')
          
          # Seed data first
          export VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          export VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY
          node scripts/seed-local.js
          
          # Start app in background
          npm run dev &
          
          # Wait for app to be ready
          npx wait-on http://localhost:8080
          
          # Run tests
          npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker build . \
            --build-arg VITE_SUPABASE_URL=http://localhost:54321 \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_placeholder \
            -t the-spend-tracker-frontend:test
